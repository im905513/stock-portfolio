<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/static/terminal.css?v=20260408">
</head>
<body>

  <header class="site-header">
    <a href="/" class="header-brand">
      <div class="logo-mark"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <span class="logo-text">GOLDMAN<span>.</span></span>
    </a>
    <div class="header-right"><div class="live-indicator"><span class="live-dot"></span><span>即時連線</span></div></div>
  </header>

  <div class="ticker-bar"><div class="ticker-track" id="ticker-track"><span class="ticker-loading">載入即時數據中...</span></div></div>

  <nav class="pill-nav">
    <a href="/" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>首頁</a>
    <a href="/dashboard" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>儀表板</a>
    <a href="/positions" class="nav-link active"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>持股</a>
    <a href="/trades" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>交易</a>
    <a href="/fundamentals" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>產業/基本面</a>
    <a href="/stocks" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="9" y1="22" x2="9" y2="2"/><line x1="15" y1="22" x2="15" y2="2"/></svg>股票</a>
  </nav>

  <div class="page-wrapper">
    <div class="card">
      <div class="card-header">
        <span class="card-title">ACTIVE POSITIONS</span>
        <span class="card-meta" id="meta">--</span>
      </div>
      <div class="card-body" style="padding:0">
        <div id="list"><div class="empty-state">LOADING...</div></div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand"><div class="footer-name">GOLDMAN PORTFOLIO</div><div class="footer-desc">Tim's personal investment command center.</div></div>
      <div class="footer-col"><h4>導航</h4><ul><li><a href="/">首頁</a></li><li><a href="/dashboard">儀表板</a></li><li><a href="/positions">持股</a></li></ul></div>
      <div class="footer-col"><h4>分析</h4><ul><li><a href="/fundamentals">基本面</a></li><li><a href="/stocks">股票註冊</a></li></ul></div>
    </div>
    <div class="footer-bottom"><span>GOLDMAN PORTFOLIO v2.0</span><span id="footer-time">--</span></div>
  </footer>

  <script src="/static/terminal.js?v=20260408"></script>
  <script>
    async function load() {
      const res = await fetch('/api/positions/rt');
      const positions = await res.json();
      const updatedAt = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      document.getElementById('meta').textContent = (positions.length || 0) + ' SYMBOLS · 更新 ' + updatedAt;
      document.getElementById('footer-time').textContent = new Date().toLocaleString('zh-TW');

      if (!positions.length) {
        document.getElementById('list').innerHTML = '<div class="empty-state">NO ACTIVE POSITIONS — START BY ADDING STOCKS AND TRADES</div>';
        return;
      }

      let totalCost = 0, totalValue = 0, totalPnl = 0;
      let h = '<table class="data-table">';
      h += '<thead><tr><th>SYMBOL</th><th>NAME</th><th>MKT</th><th>STYLE</th><th>股數</th><th>均價</th><th>現價</th><th>市值</th><th>成本</th><th>損益</th><th>報酬%</th></tr></thead>';
      h += '<tbody>';
      for (const p of positions) {
        const tag = p.market === 'TW' ? 'tag-tw' : 'tag-us';
        const sym = p.currency === 'USD' ? '$' : 'NT$';
        const shares = Number(p.shares);
        const avgCost = Number(p.avg_cost);
        const costBasis = Number(p.cost_basis);
        const curPrice = Number(p.current_price) || 0;
        const curValue = Number(p.current_value) || 0;
        const pnl = Number(p.pnl) || 0;
        const pnlPct = Number(p.pnl_pct) || 0;
        const chg = p.change;
        const chgPct = p.change_pct;
        const chgUp = chgPct !== null && chgPct !== undefined && chgPct > 0;
        const chgDn = chgPct !== null && chgPct !== undefined && chgPct < 0;
        const noChange = (chgPct === null || chgPct === undefined || chgPct === 0) && curPrice > 0;
        const styleTag = p.investment_style === 'dca' ? '<span class="tag tag-dca">存股</span>' : p.investment_style === 'thematic' ? '<span class="tag tag-thematic">題材</span>' : '<span class="tag">—</span>';
        const priceColor = chgUp ? 'var(--green)' : chgDn ? 'var(--red)' : 'var(--text-secondary)';
        const chgLabel = chgPct !== null && chgPct !== undefined && chgPct !== 0
          ? `<span style="color:${priceColor};font-size:11px">${chgUp?'▲':'▼'} ${Math.abs(chgPct).toFixed(2)}%</span>`
          : chgPct === 0 && !noChange
          ? `<span style="color:var(--text-secondary);font-size:11px">— 0.00%</span>`
          : curPrice > 0 && !chgPct
          ? `<span style="color:var(--text-secondary);font-size:11px">收盤</span>`
          : '';
        const pnlColor = pnl > 0 ? 'var(--green)' : pnl < 0 ? 'var(--red)' : 'var(--text-secondary)';
        const pnlLabel = pnl > 0 ? `+NT$${Math.round(pnl).toLocaleString()}` : pnl < 0 ? `-NT$${Math.abs(Math.round(pnl)).toLocaleString()}` : '—';
        const pnlPctLabel = pnlPct > 0 ? `+${pnlPct.toFixed(2)}%` : pnlPct < 0 ? `${pnlPct.toFixed(2)}%` : '—';

        if (p.market !== 'US') { totalCost += costBasis; totalValue += curValue; totalPnl += pnl; }

        h += `<tr>
          <td><strong>${p.symbol}</strong></td>
          <td>${p.name}</td>
          <td><span class="tag ${tag}">${p.market}</span></td>
          <td>${styleTag}</td>
          <td style="font-family:var(--font-mono)">${shares.toLocaleString()}</td>
          <td style="font-family:var(--font-mono)">${sym}${avgCost.toLocaleString()}</td>
          <td style="font-family:var(--font-mono);color:${priceColor}">${curPrice > 0 ? sym+curPrice.toLocaleString() : '—'}${curPrice > 0 ? '<br>'+chgLabel : ''}</td>
          <td style="font-family:var(--font-mono)">${curValue > 0 ? sym+Math.round(curValue).toLocaleString() : '—'}</td>
          <td style="font-family:var(--font-mono)">${sym}${Math.round(costBasis).toLocaleString()}</td>
          <td style="font-family:var(--font-mono);color:${pnlColor};font-weight:700">${pnlLabel}</td>
          <td style="font-family:var(--font-mono);color:${pnlColor};font-weight:600">${pnlPctLabel}</td>
        </tr>`;
      }
      const totalPnlPct = totalCost > 0 ? (totalPnl / totalCost * 100) : 0;
      const totPnlColor = totalPnl > 0 ? 'var(--green)' : totalPnl < 0 ? 'var(--red)' : 'var(--text-secondary)';
      h += `<tr class="total-row">
        <td colspan="3">合計（台股）</td>
        <td colspan="4"></td>
        <td style="font-family:var(--font-mono)">NT$${Math.round(totalCost).toLocaleString()}</td>
        <td style="font-family:var(--font-mono);color:${totPnlColor};font-weight:700">${totalPnl>0?'+':''}NT$${Math.round(totalPnl).toLocaleString()}</td>
        <td style="font-family:var(--font-mono);color:${totPnlColor}">${totalPnlPct>0?'+':''}${totalPnlPct.toFixed(2)}%</td>
      </tr>`;
      h += '</tbody></table>';
      document.getElementById('list').innerHTML = h;
    }
    load();
    // 每 60 秒自動更新
    setInterval(load, 60000);
  </script>
</body>
</html>
