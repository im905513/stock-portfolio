<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRADES · GOLDMAN PORTFOLIO</title>
  <link rel="stylesheet" href="/static/terminal.css?v=20260408">
</head>
<body>

  <header class="site-header">
    <a href="/" class="header-brand">
      <div class="logo-mark"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <span class="logo-text">GOLDMAN<span>.</span></span>
    </a>
    <div class="header-right"><div class="live-indicator"><span class="live-dot"></span><span>即時連線</span></div></div>
  </header>

  <div class="ticker-bar"><div class="ticker-track" id="ticker-track"><span class="ticker-loading">載入即時數據中...</span></div></div>

  <nav class="pill-nav">
    <a href="/" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>首頁</a>
    <a href="/dashboard" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>儀表板</a>
    <a href="/positions" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>持股</a>
    <a href="/trades" class="nav-link active"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>交易</a>
    <a href="/fundamentals" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>產業/基本面</a>
    <a href="/stocks" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="9" y1="22" x2="9" y2="2"/><line x1="15" y1="22" x2="15" y2="2"/></svg>股票</a>
  </nav>

  <div class="page-wrapper">

    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><span class="card-title">NEW TRADE</span><span class="card-meta">EXECUTE ORDER</span></div>
      <div class="card-body">
        <div id="msg" class="msg"></div>
        <form class="form-grid" onsubmit="addTrade(event)">
          <div class="form-row">
            <select id="stock_id" required><option value="">— SELECT SYMBOL —</option></select>
            <input type="date" id="trade_date" required value="">
            <select id="action" required>
              <option value="buy">BUY</option>
              <option value="sell">SELL</option>
              <option value="dividend">DIVIDEND</option>
            </select>
          </div>
          <div class="form-row">
            <input type="number" id="shares" placeholder="SHARES" step="any" required>
            <input type="number" id="price" placeholder="PRICE" step="any" required>
            <input type="number" id="fee" placeholder="FEE" step="any" value="0">
            <select id="currency">
              <option value="TWD">TWD</option>
              <option value="USD">USD</option>
            </select>
          </div>
          <input type="text" id="note" placeholder="NOTE (OPTIONAL)">
          <div><button type="submit" class="btn"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>EXECUTE TRADE</button></div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">TRADE HISTORY</span><span class="card-meta" id="meta">--</span></div>
      <div class="card-body" style="padding:0">
        <div class="form-row" style="padding:14px 16px 0">
          <select id="filter-stock" onchange="applyFilter()"><option value="">ALL SYMBOLS</option></select>
          <select id="filter-action" onchange="applyFilter()">
            <option value="">ALL ACTIONS</option>
            <option value="buy">BUY</option>
            <option value="sell">SELL</option>
            <option value="dividend">DIVIDEND</option>
          </select>
        </div>
        <div id="list"><div class="empty-state">LOADING...</div></div>
      </div>
    </div>

  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand"><div class="footer-name">GOLDMAN PORTFOLIO</div><div class="footer-desc">Tim's personal investment command center.</div></div>
      <div class="footer-col"><h4>導航</h4><ul><li><a href="/">首頁</a></li><li><a href="/dashboard">儀表板</a></li><li><a href="/positions">持股</a></li></ul></div>
      <div class="footer-col"><h4>分析</h4><ul><li><a href="/fundamentals">基本面</a></li><li><a href="/stocks">股票註冊</a></li></ul></div>
    </div>
    <div class="footer-bottom"><span>GOLDMAN PORTFOLIO v2.0</span><span id="footer-time">--</span></div>
  </footer>

  <script src="/static/terminal.js?v=20260408"></script>
  <script>
    document.getElementById('trade_date').value = new Date().toISOString().slice(0,10);
    let allTrades = [], allStocks = [];

    async function load() {
      const [tradesRes, stocksRes] = await Promise.all([fetch('/api/trades'), fetch('/api/stocks')]);
      allTrades = await tradesRes.json();
      allStocks = await stocksRes.json();
      const opts = allStocks.map(s => `<option value="${s.id}">${s.symbol} ${s.name}</option>`).join('');
      document.getElementById('stock_id').innerHTML = '<option value="">— SELECT SYMBOL —</option>' + opts;
      document.getElementById('filter-stock').innerHTML = '<option value="">ALL SYMBOLS</option>' + opts;
      document.getElementById('footer-time').textContent = new Date().toLocaleString('zh-TW');
      render(allTrades);
    }

    function render(trades) {
      document.getElementById('meta').textContent = trades.length + ' RECORDS';
      if (!trades.length) { document.getElementById('list').innerHTML = '<div class="empty-state">NO TRADES MATCHING FILTER</div>'; return; }
      let h = '<table class="data-table"><thead><tr><th>DATE</th><th>SYMBOL</th><th>ACTION</th><th>SHARES</th><th>PRICE</th><th>FEE</th><th>AMOUNT</th><th>NOTE</th></tr></thead><tbody>';
      for (const t of trades) {
        const cls = t.action === 'buy' ? 'tag-buy' : t.action === 'sell' ? 'tag-sell' : 'tag-div';
        const label = t.action === 'buy' ? 'BUY' : t.action === 'sell' ? 'SELL' : 'DIV';
        const sym = t.currency === 'USD' ? '$' : 'NT$';
        const amt = Number(t.shares) * Number(t.price) + Number(t.fee || 0);
        h += `<tr><td>${t.trade_date}</td><td><strong>${t.symbol || ''}</strong></td><td><span class="tag ${cls}">${label}</span></td><td>${Number(t.shares).toLocaleString()}</td><td>${sym}${Number(t.price).toLocaleString()}</td><td>${sym}${Number(t.fee||0).toLocaleString()}</td><td>${sym}${Math.round(amt).toLocaleString()}</td><td>${t.note||'—'}</td></tr>`;
      }
      h += '</tbody></table>';
      document.getElementById('list').innerHTML = h;
    }

    function applyFilter() {
      const stockId = document.getElementById('filter-stock').value;
      const action = document.getElementById('filter-action').value;
      let f = allTrades;
      if (stockId) f = f.filter(t => String(t.stock_id) === stockId);
      if (action) f = f.filter(t => t.action === action);
      render(f);
    }

    async function addTrade(e) {
      e.preventDefault();
      const data = {
        stock_id: parseInt(document.getElementById('stock_id').value),
        trade_date: document.getElementById('trade_date').value,
        action: document.getElementById('action').value,
        shares: parseFloat(document.getElementById('shares').value),
        price: parseFloat(document.getElementById('price').value),
        fee: parseFloat(document.getElementById('fee').value) || 0,
        currency: document.getElementById('currency').value,
        note: document.getElementById('note').value || null
      };
      const res = await fetch('/api/trades', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
      const msg = document.getElementById('msg');
      if (res.ok) {
        msg.className = 'msg msg-ok'; msg.textContent = '> TRADE EXECUTED SUCCESSFULLY';
        e.target.reset(); document.getElementById('trade_date').value = new Date().toISOString().slice(0,10);
        await load();
      } else {
        const err = await res.json(); msg.className = 'msg msg-err'; msg.textContent = '> ERROR: ' + (err.detail || res.statusText);
      }
      setTimeout(() => { msg.style.display = 'none'; }, 4000);
    }
    load();
  </script>
</body>
</html>
