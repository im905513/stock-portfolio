<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUNDAMENTALS · GOLDMAN TERMINAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/static/terminal.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <i data-lucide="activity"></i>
      <span class="brand-name">GOLDMAN<span class="accent">TERMINAL</span></span>
      <span class="status-pill">FUNDAMENTALS</span>
    </div>
    <div class="topbar-right">
      <span class="live-dot"></span>
      <span class="live-text">LIVE</span>
    </div>
  </header>

  <nav class="sidebar">
    <a href="/" class="nav-item"><i data-lucide="layout-dashboard"></i><span>首頁</span></a>
    <a href="/dashboard" class="nav-item"><i data-lucide="bar-chart-3"></i><span>儀表板</span></a>
    <a href="/positions" class="nav-item"><i data-lucide="briefcase"></i><span>持股</span></a>
    <a href="/trades" class="nav-item"><i data-lucide="repeat-2"></i><span>交易</span></a>
    <a href="/fundamentals" class="nav-item active"><i data-lucide="pie-chart"></i><span>產業/基本面</span></a>
    <a href="/stocks" class="nav-item"><i data-lucide="building-2"></i><span>股票</span></a>
  </nav>

  <main class="main-content">

    <!-- ═══ HEADER BAR ═══ -->
    <div class="panel" id="header-panel">
      <div class="header-bar">
        <div class="header-left">
          <select id="stock-select" class="stock-picker">
            <option value="">— 選擇股票 —</option>
          </select>
          <span class="stock-meta" id="stock-meta"></span>
        </div>
        <div class="header-right">
          <span class="stock-price" id="stock-price">--</span>
          <span class="update-time" id="update-time">--:--</span>
        </div>
      </div>
    </div>

    <!-- ═══ TOP ROW: Valuation + Institutional + Sparkline ═══ -->
    <div class="grid-3" style="gap:0.75rem">

      <!-- VALUATION -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">[ VALUATION ]</span>
          <span class="panel-meta" id="val-badge"></span>
        </div>
        <div class="panel-body no-pad">
          <div class="val-grid" id="val-content">
            <div class="skeleton-block" style="height:200px"></div>
          </div>
        </div>
      </div>

      <!-- INSTITUTIONAL -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">[ 法人買賣超 ]</span>
          <span class="panel-meta">近5日 · <span id="inst-note">讀取中</span></span>
        </div>
        <div class="panel-body no-pad">
          <div class="inst-table-wrap" id="inst-content">
            <div class="skeleton-block" style="height:200px"></div>
          </div>
        </div>
      </div>

      <!-- REVENUE SPARKLINE -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">[ 月營收趨勢 ]</span>
          <span class="panel-meta">近6月</span>
        </div>
        <div class="panel-body no-pad">
          <div id="rev-content">
            <div class="skeleton-block" style="height:200px"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══ INDUSTRY ALLOCATION ═══ -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">[ INDUSTRY ALLOCATION · BY COST ]</span>
      </div>
      <div class="panel-body no-pad">
        <div class="alloc-layout" id="alloc-content">
          <div class="skeleton-block" style="height:100px"></div>
        </div>
      </div>
    </div>

    <!-- ═══ AI EXPORT BAR ═══ -->
    <div class="panel ai-panel" id="ai-panel" style="display:none">
      <div class="panel-header">
        <span class="panel-title">[ AI ANALYSIS ]</span>
        <span class="panel-meta" id="ai-meta"></span>
      </div>
      <div class="panel-body">
        <div class="ai-buttons">
          <button class="btn" id="btn-copy-text" onclick="copyText()">
            <i data-lucide="copy"></i> 複製純文字摘要
          </button>
          <button class="btn" onclick="downloadJSON()">
            <i data-lucide="download"></i> 下載 JSON
          </button>
          <button class="btn" onclick="downloadMD()">
            <i data-lucide="file-text"></i> 下載 Markdown
          </button>
        </div>
        <div class="ai-preview" id="ai-preview"></div>
      </div>
    </div>

  </main>

  <footer class="footer">
    <span>GOLDMAN TERMINAL v1.0 · CLASSIFIED</span>
    <span id="footer-time">--</span>
  </footer>

  <script src="/static/terminal.js"></script>
  <script>
  // ─── State ───
  let stocks = [];
  let currentId = null;
  let aiData = null;

  // ─── Init ───
  async function init() {
    const sRes = await fetch('/api/stocks');
    stocks = await sRes.json();
    const sel = document.getElementById('stock-select');
    stocks.forEach(s => {
      const o = document.createElement('option');
      o.value = s.id;
      o.textContent = `[${s.market}] ${s.symbol} ${s.name}`;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => { if (sel.value) loadAll(sel.value); });
    loadAllocation();
    setInterval(() => { if (currentId) refreshVal(); }, 60000);
  }

  async function loadAll(id) {
    currentId = parseInt(id);
    aiData = null;
    document.getElementById('ai-panel').style.display = 'none';
    showSkeletons();
    const stock = stocks.find(s => s.id === currentId);
    document.getElementById('stock-meta').textContent = `${stock.symbol} · ${stock.sector || ''} · ${stock.market}`;
    await Promise.all([loadValuation(id), loadInst(id), loadRev(id), loadAi(id)]);
    document.getElementById('update-time').textContent = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
  }

  function showSkeletons() {
    document.getElementById('val-content').innerHTML = '<div class="skeleton-block" style="height:220px"></div>';
    document.getElementById('inst-content').innerHTML = '<div class="skeleton-block" style="height:220px"></div>';
    document.getElementById('rev-content').innerHTML = '<div class="skeleton-block" style="height:220px"></div>';
  }

  async function refreshVal() { if (currentId) await loadValuation(currentId, true); }

  // ─── Valuation ───
  async function loadValuation(id, silent=false) {
    try {
      const res = await fetch(`/api/stocks/${id}/valuation`);
      const d = await res.json();
      if (d.error && !d.per) {
        if (!silent) document.getElementById('val-content').innerHTML = noData(d.error);
        return;
      }
      const s = d.stock;
      const cur = d.current_price ? `NT$${d.current_price.toLocaleString()}` : '--';
      const per = d.per ? d.per.toFixed(2) : '--';
      const pbr = d.pbr ? d.pbr.toFixed(2) : '--';
      const yld = d.dividend_yield ? `${(d.dividend_yield).toFixed(2)}%` : '--';
      const lo52 = d.price_52w_low ? `NT$${d.price_52w_low}` : '--';
      const hi52 = d.price_52w_high ? `NT$${d.price_52w_high}` : '--';

      // Fair value badge
      let badge = '', badgeCls = '';
      if (d.per) {
        if (d.per < 15) { badge = 'UNDERVALUED ◉'; badgeCls = 'green'; }
        else if (d.per < 25) { badge = 'FAIR VALUE ◉'; badgeCls = 'amber'; }
        else { badge = 'OVERVALUED ◉'; badgeCls = 'red'; }
      }
      document.getElementById('val-badge').textContent = badge;
      document.getElementById('val-badge').className = `panel-meta ${badgeCls}`;
      const priceEl = document.getElementById('stock-price');
      priceEl.textContent = cur;
      priceEl.style.color = 'var(--accent-bright)';

      // Position in 52w range
      let rangeBar = '';
      let rangePct = '--';
      if (d.current_price && d.price_52w_low && d.price_52w_high) {
        const range = d.price_52w_high - d.price_52w_low;
        rangePct = range > 0 ? Math.round((d.current_price - d.price_52w_low) / range * 100) : 50;
        const w = Math.max(2, Math.min(98, rangePct));
        rangeBar = `<div class="range-bar-wrap"><div class="range-bar"><div class="range-fill" style="width:${w}%"></div></div><span>${rangePct}%</span></div>`;
      }

      document.getElementById('val-content').innerHTML = `
        <div class="val-cell"><span class="vc-label">本益比 P/E</span><span class="vc-val accent">${per}</span></div>
        <div class="val-cell"><span class="vc-label">殖利率 %</span><span class="vc-val green">${yld}</span></div>
        <div class="val-cell"><span class="vc-label">股價淨值比 P/B</span><span class="vc-val blue">${pbr}</span></div>
        <div class="val-cell"><span class="vc-label">52W High</span><span class="vc-val red">${hi52}</span></div>
        <div class="val-cell"><span class="vc-label">52W Low</span><span class="vc-val">${lo52}</span></div>
        <div class="val-cell span2"><span class="vc-label">52W Range</span>${rangeBar}</div>
      `;
    } catch(e) {
      if (!silent) document.getElementById('val-content').innerHTML = noData(e.message);
    }
  }

  // ─── Institutional ───
  async function loadInst(id) {
    try {
      const res = await fetch(`/api/stocks/${id}/institutional`);
      const d = await res.json();
      if (d.error && !d.data) {
        document.getElementById('inst-content').innerHTML = noData(d.error);
        document.getElementById('inst-note').textContent = '讀取失敗';
        return;
      }
      if (!d.data || d.data.length === 0) {
        document.getElementById('inst-content').innerHTML = noData('盤後資料，14:45 更新');
        document.getElementById('inst-note').textContent = '無資料';
        return;
      }
      document.getElementById('inst-note').textContent = '盤後 14:35 更新';
      let html = `<table class="inst-table"><thead><tr><th>日期</th><th>外資</th><th>投信</th><th>自營商</th><th>合計</th></tr></thead><tbody>`;
      d.data.forEach(r => {
        const total = r.foreign_net + r.investment_trust_net + r.dealer_net;
        const fmt = n => n > 0 ? `<span class="green">+${n.toLocaleString()}</span>` : n < 0 ? `<span class="red">${n.toLocaleString()}</span>` : '0';
        const bar = (n, max) => {
          const w = max > 0 ? Math.min(100, Math.abs(n)/max*100) : 0;
          return `<span class="bar-wrap"><span class="bar-fill ${n>=0?'green':'red'}" style="width:${w}%"></span></span>`;
        };
        const maxAbs = Math.max(...d.data.map(x => Math.abs(x.foreign_net)));
        html += `<tr>
          <td>${r.date.slice(5)}</td>
          <td>${fmt(r.foreign_net)}${bar(r.foreign_net, maxAbs)}</td>
          <td>${fmt(r.investment_trust_net)}</td>
          <td>${fmt(r.dealer_net)}</td>
          <td class="${total>=0?'green':'red'}">${fmt(total)}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('inst-content').innerHTML = html;
    } catch(e) {
      document.getElementById('inst-content').innerHTML = noData(e.message);
    }
  }

  // ─── Revenue ───
  async function loadRev(id) {
    try {
      const res = await fetch(`/api/stocks/${id}/revenue`);
      const d = await res.json();
      if (!d.data || d.data.length === 0) {
        document.getElementById('rev-content').innerHTML = noData('無月營收資料');
        return;
      }
      const rows = d.data.slice(-6).reverse();
      const sparkSvg = buildSparkline(rows.map(r => r.revenue));

      let html = `<table class="rev-table"><thead><tr><th>月份</th><th>營收</th><th>月增率</th></tr></thead><tbody>`;
      rows.forEach((r, i) => {
        const arrow = r.mom > 0 ? '▲' : r.mom < 0 ? '▼' : '─';
        const cls = r.mom > 0 ? 'green' : r.mom < 0 ? 'red' : '';
        html += `<tr>
          <td>${r.date}</td>
          <td>NT$${(r.revenue/1e8).toFixed(2)}億</td>
          <td class="${cls}">${arrow} ${r.mom > 0 ? '+' : ''}${r.mom}%</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('rev-content').innerHTML = `
        <div class="rev-layout">
          <div class="rev-table-wrap">${html}</div>
          <div class="sparkline-wrap">${sparkSvg}</div>
        </div>`;
    } catch(e) {
      document.getElementById('rev-content').innerHTML = noData(e.message);
    }
  }

  function buildSparkline(values) {
    if (!values || values.length < 2) return '';
    const w = 160, h = 70, pad = 6;
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const pts = values.map((v, i) => {
      const x = pad + (i / (values.length-1)) * (w - pad*2);
      const y = h - pad - ((v - min) / range) * (h - pad*2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    const poly = pts.join(' ');
    const lastY = pts[pts.length-1].split(',')[1];
    return `<svg class="sparkline" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
      <polyline points="${poly}" fill="none" stroke="#f0c040" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="${pts[pts.length-1].split(',')[0]}" cy="${lastY}" r="3" fill="#f0c040"/>
    </svg>`;
  }

  // ─── AI Export ───
  async function loadAi(id) {
    try {
      const res = await fetch(`/api/stocks/${id}/ai-export`);
      aiData = await res.json();
      document.getElementById('ai-meta').textContent = `${aiData.stock.symbol} ${aiData.stock.name} · ${new Date().toLocaleString('zh-TW')}`;
      document.getElementById('ai-preview').innerHTML = '<pre class="ai-text">' + aiData.text.replace(/</g,'&lt;') + '</pre>';
      document.getElementById('ai-panel').style.display = 'block';
    } catch(e) {
      document.getElementById('ai-panel').style.display = 'none';
    }
  }

  function copyText() {
    if (!aiData) return;
    navigator.clipboard.writeText(aiData.text).then(() => {
      const btn = document.getElementById('btn-copy-text');
      btn.innerHTML = '<i data-lucide="check"></i> 已複製！';
      lucide.createIcons();
      setTimeout(() => btn.innerHTML = '<i data-lucide="copy"></i> 複製純文字摘要', 2000);
    });
  }

  function downloadJSON() {
    if (!aiData) return;
    const blob = new Blob([JSON.stringify(aiData, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `goldman-${aiData.stock.symbol}-${Date.now()}.json`; a.click();
  }

  function downloadMD() {
    if (!aiData) return;
    const lines = aiData.text.split('\n');
    const md = `# ${aiData.stock.symbol} ${aiData.stock.name} · AI Analysis\n\n` + lines.join('\n');
    const blob = new Blob([md], {type:'text/markdown'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `goldman-${aiData.stock.symbol}-${Date.now()}.md`; a.click();
  }

  // ─── Industry Allocation ───
  const SECTOR_COLORS = {
    '半導體': '#f0c040', '金融': '#4fc3f7', '食品': '#3ddc97', '原物料': '#ff8800', '其他': '#888aa0'
  };

  async function loadAllocation() {
    try {
      const res = await fetch('/api/industry-allocation');
      const data = await res.json();
      if (!data || data.length === 0) {
        document.getElementById('alloc-content').innerHTML = noData('尚無持股');
        return;
      }
      const total = data.reduce((s, r) => s + r.cost, 0);
      let barsHtml = '';
      data.forEach(r => {
        const color = SECTOR_COLORS[r.sector] || SECTOR_COLORS['其他'];
        const w = r.pct;
        barsHtml += `<div class="alloc-row">
          <span class="alloc-sector" style="color:${color}">${r.sector}</span>
          <span class="alloc-pct">${r.pct}%</span>
          <span class="alloc-cost">NT$${r.cost.toLocaleString()}</span>
          <span class="alloc-count">${r.stock_count}檔</span>
        </div>`;
      });
      document.getElementById('alloc-content').innerHTML = `<div class="alloc-rows">${barsHtml}</div>`;
    } catch(e) {
      document.getElementById('alloc-content').innerHTML = noData(e.message);
    }
  }

  function noData(msg) {
    return `<div class="no-data">[ NO DATA ] ${msg}</div>`;
  }

  // Footer time
  function updateTime() {
    const now = new Date();
    document.getElementById('footer-time').textContent = now.toLocaleString('zh-TW');
  }
  updateTime(); setInterval(updateTime, 10000);

  init();
  </script>
</body>
</html>
