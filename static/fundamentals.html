<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUNDAMENTALS · GOLDMAN PORTFOLIO</title>
  <link rel="stylesheet" href="/static/terminal.css?v=20260408">
</head>
<body>

  <header class="site-header">
    <a href="/" class="header-brand">
      <div class="logo-mark"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <span class="logo-text">GOLDMAN<span>.</span></span>
    </a>
    <div class="header-right"><div class="live-indicator"><span class="live-dot"></span><span>LIVE</span></div></div>
  </header>

  <div class="ticker-bar"><div class="ticker-track" id="ticker-track"><span class="ticker-loading">載入即時數據中...</span></div></div>

  <nav class="pill-nav">
    <a href="/" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>首頁</a>
    <a href="/dashboard" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>儀表板</a>
    <a href="/positions" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>持股</a>
    <a href="/trades" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>交易</a>
    <a href="/fundamentals" class="nav-link active"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>產業/基本面</a>
    <a href="/stocks" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="9" y1="22" x2="9" y2="2"/><line x1="15" y1="22" x2="15" y2="2"/></svg>股票</a>
  </nav>

  <div class="page-wrapper">

    <!-- Stock Header Bar -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-body" style="padding:12px 16px">
        <div class="stock-header-bar">
          <div style="display:flex;align-items:center;gap:12px;flex:1">
            <select id="stock-select" class="stock-picker">
              <option value="">— 選擇股票 —</option>
            </select>
            <span class="card-meta" id="stock-meta" style="color:var(--text-secondary)"></span>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <span class="stock-price-display" id="stock-price">--</span>
            <span class="update-time" id="update-time">--:--</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Top Row: Valuation + Institutional + Revenue -->
    <div class="grid-3" style="gap:16px;margin-bottom:16px">

      <!-- Valuation -->
      <div class="card">
        <div class="card-header"><span class="card-title">VALUATION</span><span class="card-meta" id="val-badge"></span></div>
        <div class="card-body" style="padding:0">
          <div class="val-grid" id="val-content"><div class="skeleton" style="height:220px;border-radius:0"></div></div>
        </div>
      </div>

      <!-- Institutional -->
      <div class="card">
        <div class="card-header"><span class="card-title">法人買賣超</span><span class="card-meta">近5日 · <span id="inst-note">讀取中</span></span></div>
        <div class="card-body" style="padding:0">
          <div id="inst-content"><div class="skeleton" style="height:220px;border-radius:0"></div></div>
        </div>
      </div>

      <!-- Revenue Sparkline -->
      <div class="card">
        <div class="card-header"><span class="card-title">月營收趨勢</span><span class="card-meta">近6月</span></div>
        <div class="card-body" style="padding:0">
          <div id="rev-content"><div class="skeleton" style="height:220px;border-radius:0"></div></div>
        </div>
      </div>
    </div>

    <!-- Industry Allocation -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><span class="card-title">INDUSTRY ALLOCATION · BY COST</span></div>
      <div class="card-body" style="padding:0">
        <div id="alloc-content"><div class="skeleton" style="height:100px;border-radius:0;margin:8px"></div></div>
      </div>
    </div>

    <!-- AI Export -->
    <div class="card ai-panel" id="ai-panel" style="display:none">
      <div class="card-header"><span class="card-title">AI ANALYSIS EXPORT</span><span class="card-meta" id="ai-meta"></span></div>
      <div class="card-body">
        <div class="ai-buttons">
          <button class="btn-gold" id="btn-copy-text" onclick="copyText()">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            複製純文字摘要
          </button>
          <button class="btn-gold" onclick="downloadJSON()">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            下載 JSON
          </button>
          <button class="btn-gold" onclick="downloadMD()">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            下載 Markdown
          </button>
        </div>
        <div class="ai-preview" id="ai-preview"></div>
      </div>
    </div>

  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand"><div class="footer-name">GOLDMAN PORTFOLIO</div><div class="footer-desc">Tim's personal investment command center.</div></div>
      <div class="footer-col"><h4>導航</h4><ul><li><a href="/">首頁</a></li><li><a href="/dashboard">儀表板</a></li><li><a href="/positions">持股</a></li></ul></div>
      <div class="footer-col"><h4>分析</h4><ul><li><a href="/fundamentals">基本面</a></li><li><a href="/stocks">股票註冊</a></li></ul></div>
    </div>
    <div class="footer-bottom"><span>GOLDMAN PORTFOLIO v2.0</span><span id="footer-time">--</span></div>
  </footer>

  <script src="/static/terminal.js?v=20260408"></script>
  <script>
  // ─── State ───
  let stocks = [], currentId = null, aiData = null;

  // ─── Init ───
  async function init() {
    const sRes = await fetch('/api/stocks');
    stocks = await sRes.json();
    const sel = document.getElementById('stock-select');
    stocks.forEach(s => {
      const o = document.createElement('option');
      o.value = s.id;
      o.textContent = `[${s.market}] ${s.symbol} ${s.name}`;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => { if (sel.value) loadAll(sel.value); });
    loadAllocation();
    document.getElementById('footer-time').textContent = new Date().toLocaleString('zh-TW');
    setInterval(() => { if (currentId) refreshVal(); }, 60000);
  }

  async function loadAll(id) {
    currentId = parseInt(id);
    aiData = null;
    document.getElementById('ai-panel').style.display = 'none';
    showSkeletons();
    const stock = stocks.find(s => s.id === currentId);
    document.getElementById('stock-meta').textContent = `${stock.symbol} · ${stock.sector || ''} · ${stock.market}`;
    await Promise.all([loadValuation(id), loadInst(id), loadRev(id), loadAi(id)]);
    document.getElementById('update-time').textContent = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
  }

  function showSkeletons() {
    const sk = '<div class="skeleton" style="height:220px;border-radius:0"></div>';
    document.getElementById('val-content').innerHTML = sk;
    document.getElementById('inst-content').innerHTML = sk;
    document.getElementById('rev-content').innerHTML = sk;
  }

  async function refreshVal() { if (currentId) await loadValuation(currentId, true); }

  // ─── Valuation ───
  async function loadValuation(id, silent=false) {
    try {
      const res = await fetch(`/api/stocks/${id}/valuation`);
      const d = await res.json();
      if (d.error && !d.per) {
        if (!silent) document.getElementById('val-content').innerHTML = noData(d.error);
        return;
      }
      const cur = d.current_price ? `$${d.current_price.toLocaleString()}` : '--';
      const per = d.per ? d.per.toFixed(2) : '--';
      const pbr = d.pbr ? d.pbr.toFixed(2) : '--';
      const yld = d.dividend_yield ? `${(d.dividend_yield).toFixed(2)}%` : '--';
      const lo52 = d.price_52w_low ? `$${d.price_52w_low}` : '--';
      const hi52 = d.price_52w_high ? `$${d.price_52w_high}` : '--';

      let badge = '', badgeCls = '';
      if (d.per) {
        if (d.per < 15) { badge = 'UNDERVALUED ◉'; badgeCls = 'green'; }
        else if (d.per < 25) { badge = 'FAIR VALUE ◉'; badgeCls = 'amber'; }
        else { badge = 'OVERVALUED ◉'; badgeCls = 'red'; }
      }
      document.getElementById('val-badge').textContent = badge;
      document.getElementById('val-badge').className = `card-meta badge-pill ${badgeCls}`;
      document.getElementById('stock-price').textContent = cur;
      document.getElementById('stock-price').style.color = 'var(--brand)';

      let rangeBar = '', rangePct = '--';
      if (d.current_price && d.price_52w_low && d.price_52w_high) {
        const range = d.price_52w_high - d.price_52w_low;
        rangePct = range > 0 ? Math.round((d.current_price - d.price_52w_low) / range * 100) : 50;
        const w = Math.max(2, Math.min(98, rangePct));
        rangeBar = `<div class="range-wrap"><div class="range-bar"><div class="range-fill" style="width:${w}%"></div></div><span style="font-size:11px;color:var(--text-muted);margin-left:6px">${rangePct}%</span></div>`;
      }

      document.getElementById('val-content').innerHTML = `
        <div class="val-cell"><span class="vc-label">本益比 P/E</span><span class="vc-val accent">${per}</span></div>
        <div class="val-cell"><span class="vc-label">殖利率 %</span><span class="vc-val green">${yld}</span></div>
        <div class="val-cell"><span class="vc-label">股價淨值比 P/B</span><span class="vc-val blue">${pbr}</span></div>
        <div class="val-cell"><span class="vc-label">52W High</span><span class="vc-val red">${hi52}</span></div>
        <div class="val-cell"><span class="vc-label">52W Low</span><span class="vc-val">${lo52}</span></div>
        <div class="val-cell span2"><span class="vc-label">52W Range</span>${rangeBar}</div>
      `;
    } catch(e) {
      if (!silent) document.getElementById('val-content').innerHTML = noData(e.message);
    }
  }

  // ─── Institutional ───
  async function loadInst(id) {
    try {
      const res = await fetch(`/api/stocks/${id}/institutional`);
      const d = await res.json();
      if (d.error && !d.data) {
        document.getElementById('inst-content').innerHTML = noData(d.error);
        document.getElementById('inst-note').textContent = '讀取失敗';
        return;
      }
      if (!d.data || d.data.length === 0) {
        document.getElementById('inst-content').innerHTML = noData('盤後資料，14:45 更新');
        document.getElementById('inst-note').textContent = '無資料';
        return;
      }
      document.getElementById('inst-note').textContent = '盤後更新';
      const maxAbs = Math.max(...d.data.map(x => Math.abs(x.foreign_net)));
      let html = `<table class="inst-table"><thead><tr><th>日期</th><th>外資</th><th>投信</th><th>自營商</th><th>合計</th></tr></thead><tbody>`;
      d.data.forEach(r => {
        const total = r.foreign_net + r.investment_trust_net + r.dealer_net;
        const fmt = n => n > 0 ? `<span class="green">+${n.toLocaleString()}</span>` : n < 0 ? `<span class="red">${n.toLocaleString()}</span>` : '0';
        const bar = (n, max) => {
          const w = max > 0 ? Math.min(100, Math.abs(n)/max*100) : 0;
          return `<span class="bar-wrap"><span class="bar-fill ${n>=0?'green':'red'}" style="width:${w}%"></span></span>`;
        };
        html += `<tr>
          <td>${r.date.slice(5)}</td>
          <td>${fmt(r.foreign_net)}${bar(r.foreign_net, maxAbs)}</td>
          <td>${fmt(r.investment_trust_net)}</td>
          <td>${fmt(r.dealer_net)}</td>
          <td class="${total>=0?'green':'red'}">${fmt(total)}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('inst-content').innerHTML = html;
    } catch(e) {
      document.getElementById('inst-content').innerHTML = noData(e.message);
    }
  }

  // ─── Revenue ───
  async function loadRev(id) {
    try {
      const res = await fetch(`/api/stocks/${id}/revenue`);
      const d = await res.json();
      if (!d.data || d.data.length === 0) {
        document.getElementById('rev-content').innerHTML = noData('無月營收資料');
        return;
      }
      const rows = d.data.slice(-6).reverse();
      const sparkSvg = buildSparkline(rows.map(r => r.revenue));

      let html = `<table class="rev-table" style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px"><thead><tr><th style="color:var(--text-muted);font-weight:400;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border-light);font-size:11px;text-transform:uppercase;letter-spacing:0.05em">月份</th><th style="color:var(--text-muted);font-weight:400;padding:6px 8px;text-align:right;border-bottom:1px solid var(--border-light);font-size:11px;text-transform:uppercase">營收</th><th style="color:var(--text-muted);font-weight:400;padding:6px 8px;text-align:right;border-bottom:1px solid var(--border-light);font-size:11px;text-transform:uppercase">月增率</th></tr></thead><tbody>`;
      rows.forEach(r => {
        const arrow = r.mom > 0 ? '▲' : r.mom < 0 ? '▼' : '─';
        const cls = r.mom > 0 ? 'green' : r.mom < 0 ? 'red' : '';
        html += `<tr>
          <td style="padding:5px 8px;border-bottom:1px solid var(--border-light)">${r.date}</td>
          <td style="padding:5px 8px;border-bottom:1px solid var(--border-light);text-align:right;font-family:var(--font-mono)">$${(r.revenue/1e8).toFixed(2)}億</td>
          <td style="padding:5px 8px;border-bottom:1px solid var(--border-light);text-align:right" class="${cls}">${arrow} ${r.mom>0?'+':''}${r.mom}%</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('rev-content').innerHTML = `
        <div style="padding:8px 8px 4px">${html}</div>
        <div class="sparkline-wrap">${sparkSvg}</div>
      `;
    } catch(e) {
      document.getElementById('rev-content').innerHTML = noData(e.message);
    }
  }

  function buildSparkline(values) {
    if (!values || values.length < 2) return '';
    const w = 160, h = 70, pad = 6;
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const pts = values.map((v, i) => {
      const x = pad + (i / (values.length-1)) * (w - pad*2);
      const y = h - pad - ((v - min) / range) * (h - pad*2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    const poly = pts.join(' ');
    const lastX = pts[pts.length-1].split(',')[0];
    const lastY = pts[pts.length-1].split(',')[1];
    return `<svg class="sparkline" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
      <polyline points="${poly}" fill="none" stroke="#1456f0" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="${lastX}" cy="${lastY}" r="4" fill="#1456f0"/>
    </svg>`;
  }

  // ─── AI Export ───
  async function loadAi(id) {
    try {
      const res = await fetch(`/api/stocks/${id}/ai-export`);
      aiData = await res.json();
      document.getElementById('ai-meta').textContent = `${aiData.stock.symbol} ${aiData.stock.name} · ${new Date().toLocaleString('zh-TW')}`;
      document.getElementById('ai-preview').innerHTML = '<pre class="ai-text">' + aiData.text.replace(/</g,'&lt;') + '</pre>';
      document.getElementById('ai-panel').style.display = 'block';
    } catch(e) { document.getElementById('ai-panel').style.display = 'none'; }
  }

  function copyText() {
    if (!aiData) return;
    navigator.clipboard.writeText(aiData.text).then(() => {
      const btn = document.getElementById('btn-copy-text');
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 已複製！';
      setTimeout(() => {
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 複製純文字摘要';
      }, 2000);
    });
  }

  function downloadJSON() {
    if (!aiData) return;
    const blob = new Blob([JSON.stringify(aiData, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `goldman-${aiData.stock.symbol}-${Date.now()}.json`; a.click();
  }

  function downloadMD() {
    if (!aiData) return;
    const lines = aiData.text.split('\n');
    const md = `# ${aiData.stock.symbol} ${aiData.stock.name} · AI Analysis\n\n` + lines.join('\n');
    const blob = new Blob([md], {type:'text/markdown'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `goldman-${aiData.stock.symbol}-${Date.now()}.md`; a.click();
  }

  // ─── Industry Allocation ───
  const SECTOR_COLORS = {
    '半導體': '#1456f0', '金融': '#35d39a', '食品': '#3ddc97',
    '原物料': '#ff8800', '其他': '#8e8e93'
  };

  async function loadAllocation() {
    try {
      const res = await fetch('/api/industry-allocation');
      const data = await res.json();
      if (!data || data.length === 0) {
        document.getElementById('alloc-content').innerHTML = noData('尚無持股');
        return;
      }
      let html = '<div class="alloc-rows" style="padding:8px 16px">';
      data.forEach(r => {
        const color = SECTOR_COLORS[r.sector] || SECTOR_COLORS['其他'];
        html += `<div class="alloc-row">
          <span class="alloc-sector" style="color:${color}">${r.sector}</span>
          <div class="alloc-bar-wrap"><div class="alloc-bar-fill" style="width:${r.pct}%;background:${color}"></div></div>
          <span class="alloc-pct">${r.pct}%</span>
          <span class="alloc-cost">NT$${r.cost.toLocaleString()}</span>
          <span class="alloc-count">${r.stock_count}檔</span>
        </div>`;
      });
      html += '</div>';
      document.getElementById('alloc-content').innerHTML = html;
    } catch(e) {
      document.getElementById('alloc-content').innerHTML = noData(e.message);
    }
  }

  function noData(msg) {
    return `<div class="no-data" style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px">[ NO DATA ] ${msg}</div>`;
  }

  init();
  </script>
</body>
</html>
