      <span class="logo-text">GOLDMAN<span>.</span></span>

    <div class="header-right"><div class="live-indicator"><span class="live-dot"></span><span>即時連線</span></div></div>
  </header>

  <div class="ticker-bar"><div class="ticker-track" id="ticker-track"><span class="ticker-loading">載入即時數據中...</span></div></div>

  <nav class="pill-nav">
    <a href="/" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>首頁</a>
    <a href="/dashboard" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>儀表板</a>
    <a href="/positions" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>持股</a>
    <a href="/trades" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>交易</a>

    <a href="/stocks" class="nav-link active"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="9" y1="22" x2="9" y2="2"/><line x1="15" y1="22" x2="15" y2="2"/></svg>股票</a>

  </nav>

  <div class="page-wrapper">

    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><span class="card-title">ADD STOCK</span><span class="card-meta">REGISTRY ENTRY</span></div>
      <div class="card-body">
        <div id="msg" class="msg"></div>
        <form class="form-grid" onsubmit="addStock(event)">
          <div class="form-row">
            <input type="text" id="symbol" placeholder="SYMBOL (e.g. 2883)" required>
            <input type="text" id="name" placeholder="NAME (e.g. 凱基金)" required>
            <select id="market">
              <option value="TW">TW</option>
              <option value="US">US</option>
            </select>
          </div>
          <div class="form-row">
            <input type="text" id="sector" placeholder="SECTOR (e.g. FINANCE)">
            <select id="currency">
              <option value="TWD">TWD</option>
              <option value="USD">USD</option>
            </select>
            <button type="submit" class="btn"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>REGISTER</button>
          </div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">STOCK REGISTRY</span><span class="card-meta" id="meta">--</span></div>
      <div class="card-body" style="padding:0">
        <div id="list"><div class="empty-state">LOADING...</div></div>
      </div>
    </div>

  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand"><div class="footer-name">GOLDMAN PORTFOLIO</div><div class="footer-desc">Tim's personal investment command center.</div></div>
      <div class="footer-col"><h4>導航</h4><ul><li><a href="/">首頁</a></li><li><a href="/dashboard">儀表板</a></li><li><a href="/positions">持股</a></li></ul></div>
      <div class="footer-col"><h4>分析</h4><ul><li><a href="/fundamentals">基本面</a></li><li><a href="/stocks">股票註冊</a></li></ul></div>
    </div>
    <div class="footer-bottom"><span>GOLDMAN PORTFOLIO v2.0</span><span id="footer-time">--</span></div>
  </footer>

  <script src="/static/terminal.js?v=20260408"></script>
  <script>
    async function loadStocks() {
      const res = await fetch('/api/stocks');
      const stocks = await res.json();
      document.getElementById('meta').textContent = stocks.length + ' SYMBOLS';
      document.getElementById('footer-time').textContent = new Date().toLocaleString('zh-TW');
      if (!stocks.length) { document.getElementById('list').innerHTML = '<div class="empty-state">REGISTRY EMPTY</div>'; return; }
      let h = '<table class="data-table"><thead><tr><th>SYMBOL</th><th>NAME</th><th>MARKET</th><th>SECTOR</th><th>CCY</th></tr></thead><tbody>';
      for (const s of stocks) {
        const tag = s.market === 'TW' ? 'tag-tw' : 'tag-us';
        h += `<tr><td><strong>${s.symbol}</strong></td><td>${s.name}</td><td><span class="tag ${tag}">${s.market}</span></td><td>${s.sector||'—'}</td><td>${s.currency}</td></tr>`;
      }
      h += '</tbody></table>';
      document.getElementById('list').innerHTML = h;
    }

    async function addStock(e) {
      e.preventDefault();
      const data = {
        symbol: document.getElementById('symbol').value,
        name: document.getElementById('name').value,
        market: document.getElementById('market').value,
        sector: document.getElementById('sector').value || null,
        currency: document.getElementById('currency').value
      };
      const res = await fetch('/api/stocks', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
      const msg = document.getElementById('msg');
      if (res.ok) {
        msg.className = 'msg msg-ok'; msg.textContent = '> SYMBOL REGISTERED';
        e.target.reset(); loadStocks();
      } else {
        const err = await res.json(); msg.className = 'msg msg-err'; msg.textContent = '> ERROR: ' + (err.detail || res.statusText);
      }
      setTimeout(() => { msg.style.display = 'none'; }, 4000);
    }
    loadStocks();
  </script>
</body>
</html>
