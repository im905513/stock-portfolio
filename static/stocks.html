<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOCKS · GOLDMAN TERMINAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/static/terminal.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <i data-lucide="activity"></i>
      <span class="brand-name">GOLDMAN<span class="accent">TERMINAL</span></span>
      <span class="status-pill">REGISTRY</span>
    </div>
    <div class="topbar-right">
      <span class="lang"><i data-lucide="languages"></i> 中</span>
      <span class="live-dot"></span>
      <span class="live-text">即時連線</span>
    </div>
  </header>

  <div class="ticker-bar">
    <div class="ticker-track" id="ticker-track">
      <span class="ticker-loading">載入即時數據中...</span>
    </div>
  </div>

  <nav class="sidebar">
    <a href="/" class="nav-item"><i data-lucide="layout-dashboard"></i><span>首頁</span></a>
    <a href="/dashboard" class="nav-item"><i data-lucide="bar-chart-3"></i><span>儀表板</span></a>
    <a href="/positions" class="nav-item"><i data-lucide="briefcase"></i><span>持股</span></a>
    <a href="/trades" class="nav-item"><i data-lucide="repeat-2"></i><span>交易</span></a>
    <a href="/stocks" class="nav-item active"><i data-lucide="building-2"></i><span>股票</span></a>
  </nav>

  <main class="main-content">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">[ ADD STOCK ]</span>
        <span class="panel-meta">REGISTRY ENTRY</span>
      </div>
      <div class="panel-body">
        <div id="msg" class="msg"></div>
        <form class="terminal-form" onsubmit="addStock(event)">
          <div class="form-row">
            <input type="text" id="symbol" placeholder="SYMBOL (e.g. 2883)" required>
            <input type="text" id="name" placeholder="NAME (e.g. 凱基金)" required>
            <select id="market">
              <option value="TW">TW</option>
              <option value="US">US</option>
            </select>
          </div>
          <div class="form-row">
            <input type="text" id="sector" placeholder="SECTOR (e.g. FINANCE)">
            <select id="currency">
              <option value="TWD">TWD</option>
              <option value="USD">USD</option>
            </select>
            <button type="submit"><i data-lucide="plus-circle" style="width:14px;height:14px;vertical-align:middle;margin-right:6px;"></i>REGISTER</button>
          </div>
        </form>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">[ STOCK REGISTRY ]</span>
        <span class="panel-meta" id="meta">--</span>
      </div>
      <div class="panel-body">
        <div id="list"><div class="empty">LOADING...</div></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span>GOLDMAN TERMINAL v1.0 · CLASSIFIED</span>
    <span id="footer-time">--</span>
  </footer>

  <script src="/static/terminal.js"></script>
  <script>
    async function loadStocks() {
      const res = await fetch('/api/stocks');
      const stocks = await res.json();
      document.getElementById('meta').textContent = stocks.length + ' SYMBOLS';

      if (!stocks.length) {
        document.getElementById('list').innerHTML = '<div class="empty">REGISTRY EMPTY</div>';
        return;
      }
      let html = '<table><thead><tr><th>SYMBOL</th><th>NAME</th><th>MARKET</th><th>SECTOR</th><th>CCY</th></tr></thead><tbody>';
      for (const s of stocks) {
        const tagCls = s.market === 'TW' ? 'tag-tw' : 'tag-us';
        html += `<tr>
          <td><strong>${s.symbol}</strong></td>
          <td>${s.name}</td>
          <td><span class="tag ${tagCls}">${s.market}</span></td>
          <td>${s.sector || '-'}</td>
          <td>${s.currency}</td>
        </tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('list').innerHTML = html;
    }

    async function addStock(e) {
      e.preventDefault();
      const data = {
        symbol: document.getElementById('symbol').value,
        name: document.getElementById('name').value,
        market: document.getElementById('market').value,
        sector: document.getElementById('sector').value || null,
        currency: document.getElementById('currency').value
      };
      const res = await fetch('/api/stocks', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      const msg = document.getElementById('msg');
      if (res.ok) {
        msg.className = 'msg msg-ok';
        msg.textContent = '> SYMBOL REGISTERED';
        e.target.reset();
        loadStocks();
      } else {
        const err = await res.json();
        msg.className = 'msg msg-err';
        msg.textContent = '> ERROR: ' + (err.detail || res.statusText);
      }
      setTimeout(() => { msg.style.display = 'none'; }, 3000);
    }

    loadStocks();
  </script>
</body>
</html>
