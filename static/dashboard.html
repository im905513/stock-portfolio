<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DASHBOARD · GOLDMAN TERMINAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/static/terminal.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <i data-lucide="activity"></i>
      <span class="brand-name">GOLDMAN<span class="accent">TERMINAL</span></span>
      <span class="status-pill">DASHBOARD</span>
    </div>
    <div class="topbar-right">
      <span class="lang"><i data-lucide="languages"></i> 中</span>
      <span class="live-dot"></span>
      <span class="live-text">即時連線</span>
    </div>
  </header>

  <div class="ticker-bar">
    <div class="ticker-track" id="ticker-track">
      <span class="ticker-loading">載入即時數據中...</span>
    </div>
  </div>

  <nav class="sidebar">
    <a href="/" class="nav-item"><i data-lucide="layout-dashboard"></i><span>首頁</span></a>
    <a href="/dashboard" class="nav-item active"><i data-lucide="bar-chart-3"></i><span>儀表板</span></a>
    <a href="/positions" class="nav-item"><i data-lucide="briefcase"></i><span>持股</span></a>
    <a href="/trades" class="nav-item"><i data-lucide="repeat-2"></i><span>交易</span></a>
    <a href="/stocks" class="nav-item"><i data-lucide="building-2"></i><span>股票</span></a>
  </nav>

  <main class="main-content">
    <div class="grid-2">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">[ TOTAL NAV ]</span>
          <span class="panel-meta" id="nav-time">--</span>
        </div>
        <div class="panel-body">
          <div class="big-stat" id="nav-value">--</div>
          <div class="stat-sub">
            <span class="label">CASH</span>
            <span class="value" id="cash-value">--</span>
          </div>
          <div class="stat-sub">
            <span class="label">EQUITY COST</span>
            <span class="value" id="equity-value">--</span>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">[ TARGET TRACKING ]</span>
          <span class="panel-meta">2031 GOAL</span>
        </div>
        <div class="panel-body">
          <div class="big-stat" id="progress-value">--</div>
          <div class="stat-sub">
            <span class="label">TARGET</span>
            <span class="value">NT$ 5,000,000</span>
          </div>
          <div class="stat-sub">
            <span class="label">GAP</span>
            <span class="value" id="gap-value">--</span>
          </div>
          <div class="stat-sub">
            <span class="label">PASSIVE GOAL</span>
            <span class="value">NT$ 200,000 / YR</span>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">[ POSITIONS ]</span>
        <span class="panel-meta" id="pos-meta">--</span>
      </div>
      <div class="panel-body">
        <div id="positions-list"><div class="empty">LOADING...</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">[ RECENT TRADES ]</span>
        <span class="panel-meta">LAST 10</span>
      </div>
      <div class="panel-body">
        <div id="recent-trades"><div class="empty">LOADING...</div></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span>GOLDMAN TERMINAL v1.0 · CLASSIFIED</span>
    <span id="footer-time">--</span>
  </footer>

  <script src="/static/terminal.js"></script>
  <script>
    async function loadDashboard() {
      try {
        const [posRes, tradesRes, navRes] = await Promise.all([
          fetch('/api/positions'),
          fetch('/api/trades'),
          fetch('/api/nav')
        ]);
        const positions = await posRes.json();
        const trades = await tradesRes.json();
        const nav = await navRes.json();

        const equityCost = nav.total_cost || 0;
        const cash = nav.cash || 0;
        const totalNav = equityCost + cash;

        // Override homepage stats
        document.getElementById('nav-value').textContent = 'NT$ ' + Math.round(totalNav).toLocaleString();
        document.getElementById('cash-value').textContent = 'NT$ ' + Math.round(cash).toLocaleString();
        document.getElementById('equity-value').textContent = 'NT$ ' + Math.round(equityCost).toLocaleString();

        const target = 5000000;
        const progress = totalNav / target * 100;
        document.getElementById('progress-value').textContent = progress.toFixed(1) + '%';
        document.getElementById('gap-value').textContent = 'NT$ ' + Math.round(target - totalNav).toLocaleString();

        document.getElementById('pos-meta').textContent = (positions.length || 0) + ' SYMBOLS';

        // Positions
        if (positions.length === 0) {
          document.getElementById('positions-list').innerHTML = '<div class="empty">NO POSITIONS</div>';
        } else {
          let html = '<table><thead><tr><th>SYMBOL</th><th>NAME</th><th>MKT</th><th>SHARES</th><th>AVG COST</th><th>COST BASIS</th></tr></thead><tbody>';
          for (const p of positions) {
            const tagCls = p.market === 'TW' ? 'tag-tw' : 'tag-us';
            const sym = p.currency === 'USD' ? '$' : 'NT$';
            html += `<tr>
              <td><strong>${p.symbol}</strong></td>
              <td>${p.name}</td>
              <td><span class="tag ${tagCls}">${p.market}</span></td>
              <td>${Number(p.shares).toLocaleString()}</td>
              <td>${sym}${Number(p.avg_cost).toLocaleString()}</td>
              <td>${sym}${Number(p.cost_basis).toLocaleString()}</td>
            </tr>`;
          }
          html += '</tbody></table>';
          document.getElementById('positions-list').innerHTML = html;
        }

        // Recent trades
        if (trades.length === 0) {
          document.getElementById('recent-trades').innerHTML = '<div class="empty">NO TRADES</div>';
        } else {
          let html = '<table><thead><tr><th>DATE</th><th>SYMBOL</th><th>ACTION</th><th>SHARES</th><th>PRICE</th><th>AMOUNT</th></tr></thead><tbody>';
          for (const t of trades.slice(0, 10)) {
            const cls = t.action === 'buy' ? 'tag-buy' : t.action === 'sell' ? 'tag-sell' : 'tag-div';
            const label = t.action === 'buy' ? 'BUY' : t.action === 'sell' ? 'SELL' : 'DIV';
            const sym = t.currency === 'USD' ? '$' : 'NT$';
            const amount = Number(t.shares) * Number(t.price);
            html += `<tr>
              <td>${t.trade_date}</td>
              <td><strong>${t.symbol}</strong> ${t.name || ''}</td>
              <td><span class="tag ${cls}">${label}</span></td>
              <td>${Number(t.shares).toLocaleString()}</td>
              <td>${sym}${Number(t.price).toLocaleString()}</td>
              <td>${sym}${Math.round(amount).toLocaleString()}</td>
            </tr>`;
          }
          html += '</tbody></table>';
          document.getElementById('recent-trades').innerHTML = html;
        }

        if (window.lucide) lucide.createIcons();
      } catch (e) {
        document.getElementById('positions-list').innerHTML = '<div class="empty">LOAD FAIL: ' + e.message + '</div>';
      }
    }

    loadDashboard();
    setInterval(loadDashboard, 60000);
  </script>
</body>
</html>
